<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Catcher 🚀</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
        }

        #score { font-size: 24px; font-weight: bold; }
        #best-score { font-size: 16px; opacity: 0.8; margin-top: 5px; }

        #player {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            transition: left 0.1s;
            z-index: 5;
            line-height: 1;
        }

        #star {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            line-height: 1;
        }

        #gameOver, #startScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #startScreen { display: block; }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            width: 80%;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
        }

        #controls button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .info {
            position: fixed;
            bottom: 110px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="ui-layer">
            <div id="score">⭐ 0</div>
            <div id="best-score">Best: 0</div>
        </div>

        <div id="startScreen">
            <h2>Welcome!</h2>
            <input type="text" id="playerName" placeholder="Enter your name" maxlength="15">
            <br>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="player">🚀</div>
        <div id="star">⭐</div>

        <div id="gameOver">
            <h2 id="overTitle">Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <p id="recordMsg" style="color: #27ae60; font-weight: bold; display: none;">New Personal Record! 🎉</p>
            <button onclick="restart()">Play Again</button>
        </div>
    </div>

    <div id="controls">
        <button ontouchstart="move('left')" onmousedown="move('left')">◀</button>
        <button ontouchstart="move('right')" onmousedown="move('right')">▶</button>
    </div>
    <p class="info">Use buttons or Arrow keys</p>

    <script>
        let score = 0;
        let gameRunning = false;
        let playerX = 50;
        let starY = -10;
        let starX = 50;
        let speed = 0.3;
        let currentPlayer = "";

        const player = document.getElementById('player');
        const star = document.getElementById('star');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const gameOverEl = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');

        function startGame() {
            const nameInput = document.getElementById('playerName').value.trim();
            currentPlayer = nameInput || "Guest";
            startScreen.style.display = 'none';
            updateBestScoreDisplay();
            gameRunning = true;
            resetStar();
            gameLoop();
        }

        function updateBestScoreDisplay() {
            const savedBest = localStorage.getItem('best_' + currentPlayer) || 0;
            bestScoreEl.textContent = `Best for ${currentPlayer}: ${savedBest}`;
        }

        function move(direction) {
            if (!gameRunning) return;
            if (direction === 'left' && playerX > 10) playerX -= 8;
            else if (direction === 'right' && playerX < 90) playerX += 8;
            player.style.left = playerX + '%';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        function gameLoop() {
            if (!gameRunning) return;
            
            starY += speed;
            if (starY > 110) {
                handleGameOver();
                return;
            }
            
            const pR = player.getBoundingClientRect();
            const sR = star.getBoundingClientRect();
            const dist = Math.sqrt(Math.pow((pR.left+pR.width/2)-(sR.left+sR.width/2), 2) + Math.pow((pR.top+pR.height/2)-(sR.top+sR.height/2), 2));
            
            if (dist < 45) {
                score++;
                scoreEl.textContent = '⭐ ' + score;
                resetStar();
                if (score % 3 === 0) speed += 0.05;
            }
            
            star.style.top = starY + 'vh';
            star.style.left = starX + '%';
            requestAnimationFrame(gameLoop);
        }

        function handleGameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            
            // Логіка рекордів
            const savedBest = parseInt(localStorage.getItem('best_' + currentPlayer) || 0);
            const recordMsg = document.getElementById('recordMsg');
            
            if (score > savedBest) {
                localStorage.setItem('best_' + currentPlayer, score);
                recordMsg.style.display = 'block';
            } else {
                recordMsg.style.display = 'none';
            }
            
            updateBestScoreDisplay();
            gameOverEl.style.display = 'block';
        }

        function restart() {
            score = 0;
            speed = 0.3;
            starY = -10;
            playerX = 50;
            gameRunning = true;
            scoreEl.textContent = '⭐ 0';
            player.style.left = '50%';
            gameOverEl.style.display = 'none';
            resetStar();
            gameLoop();
        }

        function resetStar() {
            starY = -10;
            starX = Math.random() * 80 + 10;
        }
    </script>
</body>
</html>
