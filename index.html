<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Catcher 🚀</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
        }

        #score { font-size: 24px; font-weight: bold; }
        #best-score { font-size: 16px; opacity: 0.8; margin-top: 5px; }

        #player {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            transition: left 0.1s;
            z-index: 5;
            line-height: 1;
        }

        #star {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            line-height: 1;
        }

        .overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 280px;
        }

        #startScreen { display: block; }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            width: 80%;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        #leaderboard {
            margin-top: 15px; text-align: left; font-size: 14px;
            max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px;
        }
        .score-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #f9f9f9; }
        .is-me { font-weight: bold; color: #e67e22; }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
        }

        #controls button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .info {
            position: fixed;
            bottom: 110px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="ui-layer">
            <div id="score">⭐ 0</div>
            <div id="best-score">Best: 0</div>
        </div>

        <div id="startScreen" class="overlay">
            <h2>Welcome!</h2>
            <input type="text" id="playerName" placeholder="Enter your name" maxlength="15">
            <br>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="player">🚀</div>
        <div id="star">⭐</div>

        <div id="gameOver" class="overlay">
            <h2 id="overTitle" style="margin-top:0; color:#e74c3c">Game Over!</h2>
            <p>Score: <b id="finalScore">0</b></p>
            <p id="recordMsg" style="color: #27ae60; font-weight: bold; display: none;">New Record! 🎉</p>
            
            <div id="leaderboard">Loading rankings...</div>
            <br>
            <button onclick="restart()">Play Again</button>
        </div>
    </div>

    <div id="controls">
        <button ontouchstart="move('left')" onmousedown="move('left')">◀</button>
        <button ontouchstart="move('right')" onmousedown="move('right')">▶</button>
    </div>
    <p class="info">Use buttons or Arrow keys</p>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgtTuQmp5euCs4rqWYUqqCayk_Z9wlwUO05WqDT80Du0i0Pz1mix2BgRO0uKT1L3bY/exec"; 

        let score = 0, gameRunning = false, playerX = 50, starY = -10, starX = 50, speed = 0.3, currentPlayer = "";
        const player = document.getElementById('player'), star = document.getElementById('star'), scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score'), gameOverEl = document.getElementById('gameOver'), startScreen = document.getElementById('startScreen');

        if(localStorage.getItem('lastPlayerName')) {
            document.getElementById('playerName').value = localStorage.getItem('lastPlayerName');
        }

        function startGame() {
            const nameInput = document.getElementById('playerName').value.trim();
            if(!nameInput) return alert("Please enter your name!");
            currentPlayer = nameInput;
            localStorage.setItem('lastPlayerName', currentPlayer);
            startScreen.style.display = 'none';
            updateBestScoreDisplay();
            gameRunning = true;
            resetStar();
            gameLoop();
        }

        function updateBestScoreDisplay() {
            const savedBest = localStorage.getItem('best_' + currentPlayer) || 0;
            bestScoreEl.textContent = `Best for ${currentPlayer}: ${savedBest}`;
        }

        function move(direction) {
            if (!gameRunning) return;
            if (direction === 'left' && playerX > 10) playerX -= 8;
            else if (direction === 'right' && playerX < 90) playerX += 8;
            player.style.left = playerX + '%';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        function gameLoop() {
            if (!gameRunning) return;
            starY += speed;
            if (starY > 110) return handleGameOver();
            
            const pR = player.getBoundingClientRect(), sR = star.getBoundingClientRect();
            const dist = Math.sqrt(Math.pow((pR.left+pR.width/2)-(sR.left+sR.width/2), 2) + Math.pow((pR.top+pR.height/2)-(sR.top+sR.height/2), 2));
            
            if (dist < 45) {
                score++;
                scoreEl.textContent = '⭐ ' + score;
                resetStar();
                if (score % 3 === 0) speed += 0.05;
            }
            star.style.top = starY + 'vh';
            star.style.left = starX + '%';
            requestAnimationFrame(gameLoop);
        }

        function handleGameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            const savedBest = parseInt(localStorage.getItem('best_' + currentPlayer) || 0);
            
            if (score > savedBest) {
                localStorage.setItem('best_' + currentPlayer, score);
                document.getElementById('recordMsg').style.display = 'block';
            } else {
                document.getElementById('recordMsg').style.display = 'none';
            }
            
            updateBestScoreDisplay();
            gameOverEl.style.display = 'block';
            
            saveScoreToCloud(currentPlayer, score);
        }

        function saveScoreToCloud(name, score) {
            document.getElementById('leaderboard').innerHTML = "Updating leaderboard...";
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({name: name, score: score})
            })
            .then(() => loadLeaderboard())
            .catch(err => {
                console.error(err);
                document.getElementById('leaderboard').innerHTML = "Error loading scores.";
            });
        }

        function loadLeaderboard() {
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    let html = "<b>TOP PLAYERS:</b>";
                    data.forEach((entry, index) => {
                        let isMe = (entry.name === currentPlayer) ? "is-me" : "";
                        html += `<div class="score-row ${isMe}">
                            <span>${index+1}. ${entry.name}</span>
                            <span>⭐ ${entry.score}</span>
                        </div>`;
                    });
                    document.getElementById('leaderboard').innerHTML = html;
                });
        }

        function restart() {
            score = 0;
            speed = 0.3;
            starY = -10;
            playerX = 50;
            gameRunning = true;
            scoreEl.textContent = '⭐ 0';
            player.style.left = '50%';
            gameOverEl.style.display = 'none';
            resetStar();
            gameLoop();
        }

        function resetStar() {
            starY = -10;
            starX = Math.random() * 80 + 10;
        }
    </script>
</body>
</html>
